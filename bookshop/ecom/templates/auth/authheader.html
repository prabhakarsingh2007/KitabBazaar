<!-- Header -->
<div class="bg-white shadow-md px-6 py-4 flex items-center justify-between">

    <!-- Logo -->
    <a href="{% url 'home' %}" class="text-2xl font-bold text-blue-600">
        Bookshop
    </a>




    <div class="p-4 border-lg border-slate-200 flex h-fit gap-4">
        {% if user.is_authenticated %}
         <a href="{% url 'home' %}" class="px-4">Hii, {{ request.user.first_name }}</a>
        <a href="{% url 'logout' %}" class="px-4">Logout</a>
       
        {% else %}
        <a href="{% url 'login' %}" class="px-4">Login</a>
        <a href="{% url 'register' %}" class="px-4">Register</a>
        {% endif %}
    </div>


</div>
