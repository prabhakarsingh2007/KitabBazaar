{% extends 'auth/authbase.html' %}
{% load crispy_forms_tags %}


{% block content %}

<div class="flex flex-1 items-center justify-center h-[70vh]">
    <div class=" w-full md:w-1/2 ">
        <h2 class="space-y-3 font-semibold text-2xl">Login to Your Account</h2>
        
        <form action="" method="post" enctype="multipart/form-data">
           {% csrf_token %} 
           
           {{ form|crispy }}

           <button type="submit" class="bg-purple-700 text-white px-3 py-2 rounded mt-5">
               Login
           </button>
        </form>

    </div>  
</div>
   
{% endblock %}
